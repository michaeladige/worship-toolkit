name: Deploy Beta to GitHub Pages

on:
  push:
    branches: [feature/session-sections-nashville]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build (beta base href)
        run: npx ng build --base-href /worship-toolkit/beta/ --configuration production

      - name: Copy 404 redirect
        run: cp dist/worship-toolkit/browser/index.html dist/worship-toolkit/browser/404.html

      - name: Deploy to gh-pages/beta
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: dist/worship-toolkit/browser
          destination_dir: beta
          keep_files: true
