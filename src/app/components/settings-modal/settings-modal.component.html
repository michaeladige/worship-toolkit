<div class="modal-backdrop" (click)="onBackdropClick($event)">
  <div class="modal-dialog" role="dialog" aria-modal="true" [attr.aria-label]="ui.t('Settings', 'Optiones')">

    <div class="modal-header">
      <h2 class="modal-title">{{ ui.t('Settings', 'Optiones') }}</h2>
      <button class="close-btn" (click)="ui.closeSettingsModal()" title="Close">✕</button>
    </div>

    <!-- Appearance -->
    <div class="settings-section">
      <h3 class="settings-heading">{{ ui.t('Appearance', 'Aspectus') }}</h3>

      <div class="setting-row">
        <span class="setting-label">{{ ui.t('Theme', 'Thema') }}</span>
        <button class="setting-btn" (click)="ui.toggleTheme()">
          {{ ui.theme === 'dark' ? '☀️ ' + ui.t('Light', 'Lux') : '🌙 ' + ui.t('Dark', 'Tenebrae') }}
        </button>
      </div>

      <div class="setting-row">
        <span class="setting-label">{{ ui.t('Text size', 'Magnitudo Textus') }}</span>
        <div class="font-size-controls">
          <button
            class="font-step-btn"
            (click)="ui.adjustFontSize(-1)"
            [disabled]="ui.fontSize <= ui.fontSizes[0]"
          >A−</button>
          <span class="font-size-value">{{ ui.fontSize }}px</span>
          <button
            class="font-step-btn"
            (click)="ui.adjustFontSize(1)"
            [disabled]="ui.fontSize >= ui.fontSizes[ui.fontSizes.length - 1]"
          >A+</button>
        </div>
      </div>
    </div>

    <!-- Language -->
    <div class="settings-section settings-section--last">
      <h3 class="settings-heading">{{ ui.t('Language', 'Lingua') }}</h3>

      <div class="setting-row">
        <span class="setting-label">{{ ui.t('Latin mode', 'Modus Latinus') }} 🏛️</span>
        <button
          class="setting-btn"
          [class.setting-btn--active]="ui.latinMode"
          (click)="ui.toggleLatinMode()"
        >
          {{ ui.latinMode ? ui.t('On', 'Activus') : ui.t('Off', 'Inactivus') }}
        </button>
      </div>
    </div>

  </div>
</div>
