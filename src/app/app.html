<div class="app-shell">
  <!-- Slim app header: manual link, font size, dark mode, always in flow (never overlaps toolbar) -->
  <div class="app-header">
    <a class="brand" routerLink="/">WorshipToolkit <span class="version-tag">v{{ version }}</span></a>

    <div class="ui-controls">
      <a
        class="ui-ctrl-btn manual-link"
        routerLink="/manual"
        routerLinkActive="active"
        title="Open the user manual"
      >📖<span class="ctrl-label"> Manual</span></a>
      <button
        class="ui-ctrl-btn new-set-btn"
        (click)="onNewSet()"
        [disabled]="sessionsSvc.currentSongs.length === 0"
        title="Start a new set"
      >➕<span class="ctrl-label"> New</span></button>
      <button
        class="ui-ctrl-btn sessions-btn"
        (click)="sessionsSvc.openModal()"
        title="Saved sets"
      >💾<span class="set-name"> {{ sessionsSvc.activeSessionName || 'Untitled set' }}</span> ▾</button>
      <span class="ui-label">Text size</span>
      <button
        class="ui-ctrl-btn"
        (click)="ui.adjustFontSize(-1)"
        [disabled]="ui.fontSize <= ui.fontSizes[0]"
        title="Smaller text"
      >A-</button>
      <button
        class="ui-ctrl-btn"
        (click)="ui.adjustFontSize(1)"
        [disabled]="ui.fontSize >= ui.fontSizes[ui.fontSizes.length - 1]"
        title="Larger text"
      >A+</button>
      <button
        class="ui-ctrl-btn theme-toggle"
        (click)="ui.toggleTheme()"
        [title]="ui.theme === 'dark' ? 'Switch to light mode' : 'Switch to dark mode'"
      >{{ ui.theme === 'dark' ? '☀️' : '🌙' }}</button>
    </div>
  </div>

  <router-outlet />

  @if (sessionsSvc.showModal) {
    <app-sessions-modal />
  }
</div>
